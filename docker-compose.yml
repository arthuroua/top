services:
  db:
    image: postgres:16
    container_name: carimport-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: carimport-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"

  api:
    build:
      context: ./apps/api
    container_name: carimport-api
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      INGESTION_QUEUE_KEY: ${INGESTION_QUEUE_KEY}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - db
      - redis

  ingestion-worker:
    build:
      context: ./apps/api
    container_name: carimport-ingestion-worker
    restart: unless-stopped
    command: ["python", "-m", "app.workers.ingestion_worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      INGESTION_QUEUE_KEY: ${INGESTION_QUEUE_KEY}
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./apps/web
    container_name: carimport-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      - api

volumes:
  db_data:
