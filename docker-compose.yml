services:
  db:
    image: postgres:16
    container_name: carimport-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: carimport-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"

  api:
    build:
      context: ./apps/api
    container_name: carimport-api
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      INGESTION_QUEUE_KEY: ${INGESTION_QUEUE_KEY}
      COPART_CONNECTOR_MODE: ${COPART_CONNECTOR_MODE}
      IAAI_CONNECTOR_MODE: ${IAAI_CONNECTOR_MODE}
      COPART_API_BASE_URL: ${COPART_API_BASE_URL}
      COPART_API_ENDPOINT_PATH: ${COPART_API_ENDPOINT_PATH}
      COPART_VIN_QUERY_PARAM: ${COPART_VIN_QUERY_PARAM}
      COPART_LOT_QUERY_PARAM: ${COPART_LOT_QUERY_PARAM}
      COPART_API_AUTH_HEADER: ${COPART_API_AUTH_HEADER}
      COPART_API_TOKEN: ${COPART_API_TOKEN}
      COPART_API_KEY: ${COPART_API_KEY}
      COPART_API_TIMEOUT_SECONDS: ${COPART_API_TIMEOUT_SECONDS}
      COPART_API_RETRY_COUNT: ${COPART_API_RETRY_COUNT}
      COPART_API_RETRY_BACKOFF_MS: ${COPART_API_RETRY_BACKOFF_MS}
      COPART_API_RATE_LIMIT_PER_SECOND: ${COPART_API_RATE_LIMIT_PER_SECOND}
      IAAI_API_BASE_URL: ${IAAI_API_BASE_URL}
      IAAI_API_ENDPOINT_PATH: ${IAAI_API_ENDPOINT_PATH}
      IAAI_VIN_QUERY_PARAM: ${IAAI_VIN_QUERY_PARAM}
      IAAI_LOT_QUERY_PARAM: ${IAAI_LOT_QUERY_PARAM}
      IAAI_API_AUTH_HEADER: ${IAAI_API_AUTH_HEADER}
      IAAI_API_TOKEN: ${IAAI_API_TOKEN}
      IAAI_API_KEY: ${IAAI_API_KEY}
      IAAI_API_TIMEOUT_SECONDS: ${IAAI_API_TIMEOUT_SECONDS}
      IAAI_API_RETRY_COUNT: ${IAAI_API_RETRY_COUNT}
      IAAI_API_RETRY_BACKOFF_MS: ${IAAI_API_RETRY_BACKOFF_MS}
      IAAI_API_RATE_LIMIT_PER_SECOND: ${IAAI_API_RATE_LIMIT_PER_SECOND}
      HIDE_DATA_SOURCE: ${HIDE_DATA_SOURCE}
      PUBLIC_SOURCE_LABEL: ${PUBLIC_SOURCE_LABEL}
      MEDIA_PROXY_ALLOWED_HOSTS: ${MEDIA_PROXY_ALLOWED_HOSTS}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - db
      - redis

  ingestion-worker:
    build:
      context: ./apps/api
    container_name: carimport-ingestion-worker
    restart: unless-stopped
    command: ["python", "-m", "app.workers.ingestion_worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      INGESTION_QUEUE_KEY: ${INGESTION_QUEUE_KEY}
      COPART_CONNECTOR_MODE: ${COPART_CONNECTOR_MODE}
      IAAI_CONNECTOR_MODE: ${IAAI_CONNECTOR_MODE}
      COPART_API_BASE_URL: ${COPART_API_BASE_URL}
      COPART_API_ENDPOINT_PATH: ${COPART_API_ENDPOINT_PATH}
      COPART_VIN_QUERY_PARAM: ${COPART_VIN_QUERY_PARAM}
      COPART_LOT_QUERY_PARAM: ${COPART_LOT_QUERY_PARAM}
      COPART_API_AUTH_HEADER: ${COPART_API_AUTH_HEADER}
      COPART_API_TOKEN: ${COPART_API_TOKEN}
      COPART_API_KEY: ${COPART_API_KEY}
      COPART_API_TIMEOUT_SECONDS: ${COPART_API_TIMEOUT_SECONDS}
      COPART_API_RETRY_COUNT: ${COPART_API_RETRY_COUNT}
      COPART_API_RETRY_BACKOFF_MS: ${COPART_API_RETRY_BACKOFF_MS}
      COPART_API_RATE_LIMIT_PER_SECOND: ${COPART_API_RATE_LIMIT_PER_SECOND}
      IAAI_API_BASE_URL: ${IAAI_API_BASE_URL}
      IAAI_API_ENDPOINT_PATH: ${IAAI_API_ENDPOINT_PATH}
      IAAI_VIN_QUERY_PARAM: ${IAAI_VIN_QUERY_PARAM}
      IAAI_LOT_QUERY_PARAM: ${IAAI_LOT_QUERY_PARAM}
      IAAI_API_AUTH_HEADER: ${IAAI_API_AUTH_HEADER}
      IAAI_API_TOKEN: ${IAAI_API_TOKEN}
      IAAI_API_KEY: ${IAAI_API_KEY}
      IAAI_API_TIMEOUT_SECONDS: ${IAAI_API_TIMEOUT_SECONDS}
      IAAI_API_RETRY_COUNT: ${IAAI_API_RETRY_COUNT}
      IAAI_API_RETRY_BACKOFF_MS: ${IAAI_API_RETRY_BACKOFF_MS}
      IAAI_API_RATE_LIMIT_PER_SECOND: ${IAAI_API_RATE_LIMIT_PER_SECOND}
    depends_on:
      - db
      - redis

  copart-csv-scheduler:
    build:
      context: ./apps/api
    container_name: carimport-copart-csv-scheduler
    restart: unless-stopped
    command: ["python", "-m", "app.workers.copart_csv_scheduler"]
    environment:
      REDIS_URL: ${REDIS_URL}
      INGESTION_QUEUE_KEY: ${INGESTION_QUEUE_KEY}
      COPART_CSV_ENABLED: ${COPART_CSV_ENABLED}
      COPART_CSV_AUTH_KEY: ${COPART_CSV_AUTH_KEY}
      COPART_CSV_URL_TEMPLATE: ${COPART_CSV_URL_TEMPLATE}
      COPART_CSV_TIMEOUT_SECONDS: ${COPART_CSV_TIMEOUT_SECONDS}
      COPART_CSV_RETRY_COUNT: ${COPART_CSV_RETRY_COUNT}
      COPART_CSV_RETRY_BACKOFF_MS: ${COPART_CSV_RETRY_BACKOFF_MS}
      COPART_CSV_MAX_ROWS_PER_RUN: ${COPART_CSV_MAX_ROWS_PER_RUN}
      COPART_CSV_DEDUPE_TTL_HOURS: ${COPART_CSV_DEDUPE_TTL_HOURS}
      COPART_CSV_DEDUPE_KEY_PREFIX: ${COPART_CSV_DEDUPE_KEY_PREFIX}
      COPART_CSV_SCHEDULE_TIMES: ${COPART_CSV_SCHEDULE_TIMES}
      COPART_CSV_TIMEZONE: ${COPART_CSV_TIMEZONE}
      COPART_CSV_RUN_ON_START: ${COPART_CSV_RUN_ON_START}
    depends_on:
      - redis

  web:
    build:
      context: ./apps/web
    container_name: carimport-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      SEO_API_ENABLED: ${SEO_API_ENABLED}
      MARKET_API_ENABLED: ${MARKET_API_ENABLED}
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      - api

volumes:
  db_data:
